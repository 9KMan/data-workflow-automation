<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" id="svg-source">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- LAYER: External Sources -->
  <text x="10" y="20" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em" font-family="JetBrains Mono,monospace">EXTERNAL SOURCES</text>
  <rect x="20" y="30" width="960" height="100" rx="10"
    fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="54" fill="white" font-size="11" font-weight="600" font-family="JetBrains Mono,monospace">CSV / Excel Upload</text>
  <text x="80" y="70" fill="#ffffff" font-size="7" font-family="JetBrains Mono,monospace">multipart/form POST /api/v1/ingest/csv</text>
  <text x="80" y="82" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">openpyxl · pandas · csv module</text>

  <text x="260" y="54" fill="white" font-size="11" font-weight="600" font-family="JetBrains Mono,monospace">JSON Payload</text>
  <text x="260" y="70" fill="#ffffff" font-size="7" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/json</text>
  <text x="260" y="82" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">REST API · application/json</text>

  <text x="420" y="54" fill="white" font-size="11" font-weight="600" font-family="JetBrains Mono,monospace">Webhook Ingest</text>
  <text x="420" y="70" fill="#ffffff" font-size="7" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/wh · Stripe, Slack…</text>
  <text x="420" y="82" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Webhook signature verification</text>

  <text x="580" y="54" fill="white" font-size="11" font-weight="600" font-family="JetBrains Mono,monospace">Browser / curl</text>
  <text x="580" y="70" fill="#ffffff" font-size="7" font-family="JetBrains Mono,monospace">GET /data/* · Browser / curl</text>
  <text x="580" y="82" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">JSON API · CSV/JSON export</text>

  <text x="730" y="54" fill="white" font-size="11" font-weight="600" font-family="JetBrains Mono,monospace">Scheduled / Batch</text>
  <text x="730" y="70" fill="#ffffff" font-size="7" font-family="JetBrains Mono,monospace">cron · APScheduler · ETL triggers</text>
  <text x="730" y="82" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Automated pipeline orchestration</text>

  <!-- Arrow: Sources → FastAPI Platform -->
  <line x1="500" y1="130" x2="500" y2="165" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="518" y="150" fill="#34d399" font-size="8" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/*</text>

  <!-- LAYER: FastAPI Platform -->
  <text x="10" y="155" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em" font-family="JetBrains Mono,monospace">FASTAPI PLATFORM</text>
  <rect x="20" y="165" width="960" height="145" rx="10"
    fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1.5"/>

  <!-- Ingest Router -->
  <rect x="40" y="185" width="190" height="110" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">Ingest Router</text>
  <text x="135" y="226" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/json</text>
  <text x="135" y="240" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/csv</text>
  <text x="135" y="254" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">POST /api/v1/ingest/excel</text>
  <text x="135" y="268" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">→ raw_data table</text>
  <line x1="230" y1="240" x2="248" y2="240" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ETL Pipeline -->
  <rect x="250" y="185" width="190" height="110" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="345" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">ETL Pipeline</text>
  <text x="345" y="226" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Extract → Transform → Load</text>
  <text x="345" y="240" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Retry × 3 (exp. backoff)</text>
  <text x="345" y="254" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Rules from DB / Custom hooks</text>
  <text x="345" y="268" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">→ staging → processed</text>
  <line x1="440" y1="240" x2="458" y2="240" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Automation Router (n8n) -->
  <rect x="460" y="185" width="190" height="110" rx="8"
    fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="555" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">Automation Router</text>
  <text x="555" y="226" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">POST /api/v1/automate/trigger</text>
  <text x="555" y="240" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">POST /api/v1/automate/n8n-wh</text>
  <text x="555" y="254" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Conditions: new / changed</text>
  <text x="555" y="268" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">→ n8n webhooks</text>
  <line x1="650" y1="240" x2="668" y2="240" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- Data Query Router -->
  <rect x="670" y="185" width="190" height="110" rx="8"
    fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="765" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">Data Query Router</text>
  <text x="765" y="226" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">GET /data/{table}</text>
  <text x="765" y="240" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">/aggregate · /export · /filter</text>
  <text x="765" y="258" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">→ JSON · CSV · Excel</text>
  <line x1="860" y1="240" x2="878" y2="240" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: Platform → DB / Automation -->
  <line x1="500" y1="310" x2="500" y2="345" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="518" y="330" fill="#34d399" font-size="8" font-family="JetBrains Mono,monospace">data event →</text>

  <!-- LAYER: Databases -->
  <text x="10" y="335" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em" font-family="JetBrains Mono,monospace">DATABASES</text>
  <rect x="20" y="345" width="960" height="145" rx="10"
    fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- raw_data -->
  <rect x="50" y="365" width="210" height="110" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="155" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">raw_data</text>
  <text x="155" y="407" fill="#ffffff" font-size="9" text-anchor="middle" font-family="JetBrains Mono,monospace">transformation_rules table</text>
  <text x="155" y="422" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">field mapping · type coercion · null handling</text>
  <text x="155" y="440" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">source_path · ingestion_time · status</text>
  <text x="155" y="458" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">SQLAlchemy ORM + asyncpg</text>

  <!-- staging_data -->
  <rect x="280" y="365" width="160" height="110" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">staging_data</text>
  <text x="360" y="410" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Intermediate transform</text>
  <text x="360" y="426" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Validates schema</text>
  <text x="360" y="442" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">before → processed_data</text>

  <!-- processed_data -->
  <rect x="460" y="365" width="160" height="110" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="540" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">processed_data</text>
  <text x="540" y="410" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Final business data</text>
  <text x="540" y="426" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Queried by /data/* API</text>

  <!-- pipeline_runs -->
  <rect x="640" y="365" width="200" height="110" rx="8"
    fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">pipeline_runs</text>
  <text x="740" y="407" fill="#ffffff" font-size="9" text-anchor="middle" font-family="JetBrains Mono,monospace">pipeline_runs table</text>
  <text x="740" y="422" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">row counts · errors · timestamps</text>
  <text x="740" y="436" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">status: pending / running / done / failed</text>

  <!-- API Key Auth block -->
  <rect x="860" y="365" width="105" height="110" rx="8"
    fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="912" y="390" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">Auth</text>
  <text x="912" y="407" fill="#ffffff" font-size="9" text-anchor="middle" font-family="JetBrains Mono,monospace">API Key Auth</text>
  <text x="912" y="422" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">X-API-Key header</text>
  <text x="912" y="436" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">JWT optional</text>

  <!-- Arrows between DB boxes -->
  <line x1="260" y1="420" x2="278" y2="420" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="420" x2="458" y2="420" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="420" x2="638" y2="420" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="840" y1="420" x2="858" y2="420" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: DB → Automation / External -->
  <line x1="500" y1="490" x2="500" y2="525" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="518" y="510" fill="#fb923c" font-size="8" font-family="JetBrains Mono,monospace">Webhook-driven automation</text>

  <!-- LAYER: External Services -->
  <text x="10" y="515" fill="#64748b" font-size="9" font-weight="600" letter-spacing="0.08em" font-family="JetBrains Mono,monospace">EXTERNAL SERVICES</text>
  <rect x="20" y="525" width="960" height="120" rx="10"
    fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1.5"/>

  <!-- n8n -->
  <rect x="50" y="545" width="250" height="90" rx="8"
    fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="175" y="570" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">n8n Workflow Automation</text>
  <text x="175" y="588" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">Webhook-driven workflow automation</text>
  <text x="175" y="604" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• Slack notifications · Stripe events</text>
  <text x="175" y="618" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• CRM record updates · Scheduled triggers</text>
  <text x="175" y="632" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">app.n8n.io / self-hosted</text>

  <!-- API / Consumers -->
  <rect x="320" y="545" width="300" height="90" rx="8"
    fill="rgba(30,41,59,0.6)" stroke="#64748b" stroke-width="1.5"/>
  <text x="470" y="570" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">API Consumers</text>
  <text x="470" y="588" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">JSON API · CSV/JSON export</text>
  <text x="470" y="604" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• Grafana / BI dashboards · External APIs</text>
  <text x="470" y="618" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• Google Sheets · Mobile apps</text>
  <text x="470" y="634" fill="#ffffff" font-size="7" text-anchor="middle" font-family="JetBrains Mono,monospace">GET /data/*</text>

  <!-- Data Destinations -->
  <rect x="640" y="545" width="320" height="90" rx="8"
    fill="rgba(30,41,59,0.6)" stroke="#64748b" stroke-width="1.5"/>
  <text x="800" y="570" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="JetBrains Mono,monospace">Data Destinations</text>
  <text x="800" y="588" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• Grafana dashboards · External APIs</text>
  <text x="800" y="604" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• Google Sheets · Email reports</text>
  <text x="800" y="620" fill="#ffffff" font-size="8" text-anchor="middle" font-family="JetBrains Mono,monospace">• S3 / GCS archival · Snowflake / BigQuery</text>

  <!-- LEGEND -->
  <text x="920" y="20" fill="white" font-size="9" font-weight="600" font-family="JetBrains Mono,monospace">Legend</text>
  <rect x="920" y="32" width="14" height="9" rx="2" fill="rgba(30,41,59,0.6)" stroke="#64748b" stroke-width="1"/>
  <text x="940" y="40" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Frontend / Consumer</text>
  <rect x="920" y="47" width="14" height="9" rx="2" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1"/>
  <text x="940" y="55" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Backend Service</text>
  <rect x="920" y="62" width="14" height="9" rx="2" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1"/>
  <text x="940" y="70" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Database</text>
  <rect x="920" y="77" width="14" height="9" rx="2" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/>
  <text x="940" y="85" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Automation / Messaging</text>
  <line x1="922" y1="94" x2="932" y2="94" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="940" y="98" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Data flow</text>
  <line x1="922" y1="107" x2="932" y2="107" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="940" y="111" fill="#ffffff" font-size="8" font-family="JetBrains Mono,monospace">Event / webhook</text>
</svg>