<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680">

      <defs>
        <!-- Arrowhead -->
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
        </marker>
        <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
        </marker>
        <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
        </marker>
        <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
        </marker>
        <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
        </marker>
        <!-- Grid pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Background grid -->
      <rect width="100%" height="100%" fill="url(#grid)"/>

      <!-- ═══════════════════════════════════════════════════════
           LAYER 0 — External Sources (top row)
           ═══════════════════════════════════════════════════════ -->

      <!-- CSV source -->
      <rect x="20" y="30" width="88" height="52" rx="6"
        fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="64" y="50" fill="white" font-size="10" font-weight="600" text-anchor="middle">CSV Files</text>
      <text x="64" y="64" fill="#94a3b8" font-size="8" text-anchor="middle">.csv upload</text>
      <text x="64" y="76" fill="#64748b" font-size="7" text-anchor="middle">multipart/form</text>

      <!-- Excel source -->
      <rect x="118" y="30" width="88" height="52" rx="6"
        fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="162" y="50" fill="white" font-size="10" font-weight="600" text-anchor="middle">Excel</text>
      <text x="162" y="64" fill="#94a3b8" font-size="8" text-anchor="middle">.xlsx / .xls</text>
      <text x="162" y="76" fill="#64748b" font-size="7" text-anchor="middle">openpyxl</text>

      <!-- JSON/REST API -->
      <rect x="216" y="30" width="88" height="52" rx="6"
        fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="260" y="50" fill="white" font-size="10" font-weight="600" text-anchor="middle">REST API</text>
      <text x="260" y="64" fill="#94a3b8" font-size="8" text-anchor="middle">JSON payload</text>
      <text x="260" y="76" fill="#64748b" font-size="7" text-anchor="middle">POST /api/v1/*</text>

      <!-- Webhooks -->
      <rect x="314" y="30" width="88" height="52" rx="6"
        fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="358" y="50" fill="white" font-size="10" font-weight="600" text-anchor="middle">Webhooks</text>
      <text x="358" y="64" fill="#94a3b8" font-size="8" text-anchor="middle">POST /ingest/wh</text>
      <text x="358" y="76" fill="#64748b" font-size="7" text-anchor="middle">Stripe, Slack…</text>

      <!-- Browsers / Dashboards -->
      <rect x="412" y="30" width="88" height="52" rx="6"
        fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="456" y="50" fill="white" font-size="10" font-weight="600" text-anchor="middle">Dashboards</text>
      <text x="456" y="64" fill="#94a3b8" font-size="8" text-anchor="middle">GET /data/*</text>
      <text x="456" y="76" fill="#64748b" font-size="7" text-anchor="middle">Browser / curl</text>

      <!-- "External Sources" label -->
      <text x="10" y="18" fill="#64748b" font-size="8" font-weight="600" letter-spacing="0.08em">EXTERNAL SOURCES</text>

      <!-- Arrows down from external sources to platform -->
      <!-- CSV → Ingest Router -->
      <line x1="64" y1="82" x2="145" y2="160" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Excel → Ingest Router -->
      <line x1="162" y1="82" x2="175" y2="160" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- REST API → Ingest Router -->
      <line x1="260" y1="82" x2="230" y2="160" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
      <!-- Webhooks → Ingest Router -->
      <line x1="358" y1="82" x2="300" y2="160" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Dashboards → Data Query Router (indirect) -->
      <line x1="456" y1="82" x2="430" y2="160" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)" stroke-dasharray="4,3"/>

      <!-- ═══════════════════════════════════════════════════════
           LAYER 1 — FastAPI Platform (main backend box)
           ═══════════════════════════════════════════════════════ -->

      <!-- Platform boundary -->
      <rect x="120" y="130" width="720" height="200" rx="12"
        fill="rgba(6,78,59,0.06)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="132" y="144" fill="#34d399" font-size="8" font-weight="600" letter-spacing="0.08em">FASTAPI PLATFORM</text>

      <!-- Ingest Router -->
      <rect x="140" y="160" width="160" height="80" rx="8"
        fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
      <text x="220" y="182" fill="white" font-size="11" font-weight="600" text-anchor="middle">Ingest Router</text>
      <text x="220" y="197" fill="#6ee7b7" font-size="8" text-anchor="middle">POST /api/v1/ingest/json</text>
      <text x="220" y="209" fill="#6ee7b7" font-size="8" text-anchor="middle">POST /api/v1/ingest/csv</text>
      <text x="220" y="221" fill="#6ee7b7" font-size="8" text-anchor="middle">POST /api/v1/ingest/excel</text>
      <text x="220" y="233" fill="#64748b" font-size="7" text-anchor="middle">→ raw_data table</text>

      <!-- ETL Pipeline -->
      <rect x="340" y="160" width="160" height="80" rx="8"
        fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
      <text x="420" y="182" fill="white" font-size="11" font-weight="600" text-anchor="middle">ETL Pipeline</text>
      <text x="420" y="197" fill="#6ee7b7" font-size="8" text-anchor="middle">Extract → Transform → Load</text>
      <text x="420" y="209" fill="#6ee7b7" font-size="8" text-anchor="middle">Retry × 3 (exp. backoff)</text>
      <text x="420" y="221" fill="#6ee7b7" font-size="8" text-anchor="middle">Rules from DB / Custom hooks</text>
      <text x="420" y="233" fill="#64748b" font-size="7" text-anchor="middle">→ staging → processed</text>

      <!-- Automation / n8n Trigger -->
      <rect x="540" y="160" width="160" height="80" rx="8"
        fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
      <text x="620" y="182" fill="white" font-size="11" font-weight="600" text-anchor="middle">Automation Router</text>
      <text x="620" y="197" fill="#fdba74" font-size="8" text-anchor="middle">POST /api/v1/automate/trigger</text>
      <text x="620" y="209" fill="#fdba74" font-size="8" text-anchor="middle">POST /api/v1/automate/n8n-wh</text>
      <text x="620" y="221" fill="#fdba74" font-size="8" text-anchor="middle">Conditions: new / changed</text>
      <text x="620" y="233" fill="#64748b" font-size="7" text-anchor="middle">→ n8n webhooks</text>

      <!-- Data Query Router -->
      <rect x="740" y="160" width="80" height="80" rx="8"
        fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
      <text x="780" y="182" fill="white" font-size="10" font-weight="600" text-anchor="middle">Data Query</text>
      <text x="780" y="197" fill="#6ee7b7" font-size="8" text-anchor="middle">GET /data/{t}</text>
      <text x="780" y="209" fill="#6ee7b7" font-size="8" text-anchor="middle">/aggregate</text>
      <text x="780" y="221" fill="#6ee7b7" font-size="8" text-anchor="middle">/export</text>
      <text x="780" y="233" fill="#64748b" font-size="7" text-anchor="middle">/filter</text>

      <!-- Internal flow arrows -->
      <line x1="300" y1="200" x2="338" y2="200" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
      <line x1="500" y1="200" x2="538" y2="200" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
      <line x1="700" y1="200" x2="738" y2="200" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
      <!-- ETL → Automation (data event) -->
      <line x1="420" y1="240" x2="620" y2="240" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-orange)"/>
      <text x="520" y="236" fill="#fb923c" font-size="7" text-anchor="middle">data event →</text>

      <!-- Health / Monitoring -->
      <rect x="140" y="270" width="160" height="46" rx="6"
        fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
      <text x="220" y="288" fill="#67e8f9" font-size="9" font-weight="500" text-anchor="middle">GET /api/v1/health/</text>
      <text x="220" y="301" fill="#64748b" font-size="7" text-anchor="middle">status + pipeline stats</text>

      <!-- Transformation Rules -->
      <rect x="340" y="270" width="160" height="46" rx="6"
        fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
      <text x="420" y="288" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">transformation_rules table</text>
      <text x="420" y="301" fill="#64748b" font-size="7" text-anchor="middle">field mapping · type coercion · null</text>

      <!-- pipeline_runs log -->
      <rect x="540" y="270" width="160" height="46" rx="6"
        fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
      <text x="620" y="288" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">pipeline_runs table</text>
      <text x="620" y="301" fill="#64748b" font-size="7" text-anchor="middle">row counts · errors · timestamps</text>

      <!-- API key auth -->
      <rect x="740" y="270" width="80" height="46" rx="6"
        fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1"/>
      <text x="780" y="288" fill="#fda4af" font-size="9" font-weight="500" text-anchor="middle">API Key Auth</text>
      <text x="780" y="301" fill="#64748b" font-size="7" text-anchor="middle">X-API-Key header</text>

      <!-- ═══════════════════════════════════════════════════════
           LAYER 2 — Data & External Services (bottom row)
           ═══════════════════════════════════════════════════════ -->

      <!-- PostgreSQL Database -->
      <rect x="140" y="360" width="220" height="120" rx="10"
        fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="250" y="384" fill="white" font-size="12" font-weight="600" text-anchor="middle">PostgreSQL</text>
      <text x="250" y="402" fill="#c4b5fd" font-size="8" text-anchor="middle">SQLAlchemy ORM + asyncpg</text>
      <!-- DB Tables -->
      <rect x="160" y="412" width="80" height="28" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
      <text x="200" y="430" fill="#e9d5ff" font-size="8" text-anchor="middle">raw_data</text>
      <rect x="250" y="412" width="80" height="28" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
      <text x="290" y="430" fill="#e9d5ff" font-size="8" text-anchor="middle">staging_data</text>
      <rect x="160" y="446" width="80" height="28" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
      <text x="200" y="464" fill="#e9d5ff" font-size="8" text-anchor="middle">processed_data</text>
      <rect x="250" y="446" width="80" height="28" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
      <text x="290" y="464" fill="#e9d5ff" font-size="8" text-anchor="middle">pipeline_runs</text>

      <!-- Arrow: Platform → PostgreSQL -->
      <line x1="250" y1="330" x2="250" y2="358" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
      <text x="268" y="346" fill="#a78bfa" font-size="7">SQL</text>

      <!-- n8n Workflow Automation -->
      <rect x="410" y="360" width="220" height="120" rx="10"
        fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1.5"/>
      <text x="520" y="384" fill="white" font-size="12" font-weight="600" text-anchor="middle">n8n Workflow Engine</text>
      <text x="520" y="402" fill="#fdba74" font-size="8" text-anchor="middle">Webhook-driven workflow automation</text>
      <!-- n8n capabilities -->
      <text x="430" y="422" fill="#fdba74" font-size="8">• Slack notifications</text>
      <text x="430" y="436" fill="#fdba74" font-size="8">• Stripe event handling</text>
      <text x="430" y="450" fill="#fdba74" font-size="8">• CRM record updates</text>
      <text x="430" y="464" fill="#fdba74" font-size="8">• Scheduled triggers</text>
      <!-- n8n logo label -->
      <text x="620" y="464" fill="#fb923c" font-size="7" text-anchor="middle">app.n8n.io</text>

      <!-- Arrow: ETL → n8n (data events) -->
      <line x1="500" y1="330" x2="520" y2="358" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
      <text x="506" y="346" fill="#fb923c" font-size="7">webhook</text>

      <!-- Downstream Consumers -->
      <rect x="680" y="360" width="200" height="120" rx="10"
        fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="780" y="384" fill="white" font-size="12" font-weight="600" text-anchor="middle">Downstream Consumers</text>
      <text x="780" y="402" fill="#67e8f9" font-size="8" text-anchor="middle">JSON API · CSV/JSON export</text>
      <text x="700" y="422" fill="#67e8f9" font-size="8">• Grafana / BI dashboards</text>
      <text x="700" y="436" fill="#67e8f9" font-size="8">• External APIs</text>
      <text x="700" y="450" fill="#67e8f9" font-size="8">• Google Sheets</text>
      <text x="700" y="464" fill="#67e8f9" font-size="8">• Mobile apps</text>

      <!-- Arrow: Data Query → Downstream -->
      <line x1="820" y1="330" x2="780" y2="358" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
      <text x="796" y="346" fill="#22d3ee" font-size="7">GET /data/*</text>

      <!-- ═══════════════════════════════════════════════════════
           LEGEND (bottom right, outside all boundaries)
           ═══════════════════════════════════════════════════════ -->
      <text x="920" y="130" fill="white" font-size="9" font-weight="600">Legend</text>

      <rect x="920" y="142" width="14" height="9" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
      <text x="940" y="150" fill="#94a3b8" font-size="8">Frontend / Consumer</text>

      <rect x="920" y="157" width="14" height="9" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
      <text x="940" y="165" fill="#94a3b8" font-size="8">Backend Service</text>

      <rect x="920" y="172" width="14" height="9" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
      <text x="940" y="180" fill="#94a3b8" font-size="8">Database</text>

      <rect x="920" y="187" width="14" height="9" rx="2" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
      <text x="940" y="195" fill="#94a3b8" font-size="8">Automation / Messaging</text>

      <rect x="920" y="202" width="14" height="9" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
      <text x="940" y="210" fill="#94a3b8" font-size="8">External / Generic</text>

      <line x1="920" y1="220" x2="934" y2="220" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>
      <text x="940" y="223" fill="#94a3b8" font-size="8">Data flow</text>

      <line x1="920" y1="234" x2="934" y2="234" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-orange)"/>
      <text x="940" y="237" fill="#94a3b8" font-size="8">Event / webhook</text>

    </svg>